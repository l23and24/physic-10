<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Готуємося до контрольної роботи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)),
                        url('https://images.unsplash.com/photo-1528208079124-a2387f039c99?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            margin: 0;
        }

        .book-container {
            position: relative;
            width: 450px;
            height: 600px;
            perspective: 2000px;
            margin-top: 20px;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            border-radius: 0 15px 15px 0;
            user-select: none;
        }

        .page-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            border-radius: 0 15px 15px 0;
            overflow: hidden;
        }

        /* Стиль для PDF всередині сторінки */
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }

        .page-back {
            position: absolute;
            inset: 0;
            background: #fffbeb;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border-radius: 15px 0 0 15px;
            border-right: 2px solid #ddd;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* Правильний порядок шарів для гортання з першої сторінки */
        .page:nth-child(1) { z-index: 4; } /* Обкладинка */
        .page:nth-child(2) { z-index: 3; } /* 1.pdf */
        .page:nth-child(3) { z-index: 2; } /* 2.pdf */
        .page:nth-child(4) { z-index: 1; } /* 3.pdf */

        .btn-reset {
            margin-top: 30px;
            padding: 10px 25px;
            background: #10b981;
            color: white;
            border-radius: 99px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            z-index: 50;
        }

        /* Декорації */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .egg {
            position: absolute;
            width: 50px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #ff8c00);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: float 4s ease-in-out infinite;
            z-index: 0;
        }

        .flower {
            position: absolute;
            font-size: 30px;
            z-index: 0;
        }
    </style>
</head>
<body>

    <h1 class="text-3xl font-bold text-green-800 mb-2 text-center">Конспект уроку</h1>
    <h2 class="text-xl text-green-600 mb-8 text-center">Готуємося до контрольної роботи 🐣</h2>

    <!-- Декорації -->
    <div class="egg" style="top: 10%; left: 5%; animation-delay: 0s;"></div>
    <div class="egg" style="top: 20%; right: 10%; background: radial-gradient(circle at 30% 30%, #ff99cc, #ff3399); animation-delay: 1s;"></div>
    <div class="flower" style="bottom: 15%; left: 10%;">🌸</div>
    <div class="flower" style="bottom: 20%; right: 15%;">🌷</div>

    <div class="book-container">
        <div class="book" id="book">
            
            <!-- 1. ОБКЛАДИНКА (йде першою) -->
            <div class="page" onclick="flipPage(this)">
                <div class="page-content bg-yellow-50 border-4 border-yellow-200 items-center justify-center p-10">
                    <div class="text-8xl mb-6">📖</div>
                    <h2 class="text-3xl font-bold text-yellow-800 text-center uppercase tracking-wider">План підготовки</h2>
                    <div class="w-24 h-1.5 bg-yellow-400 my-6"></div>
                    <p class="text-center italic text-gray-700 text-lg">Гортайте сторінки для перегляду матеріалів</p>
                    <div class="mt-12 text-5xl">🪺</div>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- 2. СТОРІНКА 1 (1.pdf) -->
            <div class="page" onclick="flipPage(this)">
                <div class="page-content">
                    <iframe src="1.pdf#toolbar=0&navpanes=0&scrollbar=0" class="pdf-viewer"></iframe>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- 3. СТОРІНКА 2 (2.pdf) -->
            <div class="page" onclick="flipPage(this)">
                <div class="page-content">
                    <iframe src="2.pdf#toolbar=0&navpanes=0&scrollbar=0" class="pdf-viewer"></iframe>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- 4. СТОРІНКА 3 (3.pdf) -->
            <div class="page" onclick="flipPage(this)">
                <div class="page-content">
                    <iframe src="3.pdf#toolbar=0&navpanes=0&scrollbar=0" class="pdf-viewer"></iframe>
                </div>
                <div class="page-back"></div>
            </div>

        </div>
    </div>

    <button class="btn-reset" onclick="resetBook()">Повернутися до початку</button>

    <!-- Аудіо для звуку листання -->
    <audio id="pageFlipSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        const flipSound = document.getElementById('pageFlipSound');

        function flipPage(pageElement) {
            // Перегортаємо тільки якщо це верхня сторінка (поточна)
            if (!pageElement.classList.contains('flipped')) {
                pageElement.classList.add('flipped');
                // Знижуємо z-index після анімації, щоб можна було клікнути наступну
                setTimeout(() => {
                    pageElement.style.zIndex = parseInt(window.getComputedStyle(pageElement).zIndex) - 10;
                }, 500);
                playSound();
            }
        }

        function resetBook() {
            const pages = Array.from(document.querySelectorAll('.page')).reverse();
            pages.forEach((page, index) => {
                setTimeout(() => {
                    if (page.classList.contains('flipped')) {
                        page.classList.remove('flipped');
                        // Повертаємо початковий z-index
                        page.style.zIndex = pages.length - index;
                        playSound();
                    }
                }, index * 150);
            });
        }

        function playSound() {
            flipSound.currentTime = 0;
            flipSound.play().catch(e => console.log("Audio play blocked"));
        }
    </script>
</body>
</html>
