<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конспекти з фізики - 10 клас</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .lesson-card {
            transition: all 0.2s ease-in-out;
        }
        .lesson-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header Section -->
    <header class="bg-blue-600 text-white py-10 mb-8 shadow-lg">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center mb-4">
                <div class="bg-white p-3 rounded-full text-blue-600 shadow-inner">
                    <i class="fas fa-atom fa-3x"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold mb-2">Фізика: 10 клас</h1>
            <p class="text-blue-100 text-lg max-w-2xl mx-auto">
                Оберіть номер уроку для перегляду матеріалів.
            </p>
        </div>
    </header>

    <!-- Search and Stats -->
    <div class="container mx-auto px-4 mb-8">
        <div class="bg-white rounded-xl shadow-sm p-4 flex flex-col md:flex-row items-center justify-between gap-4 border border-gray-100">
            <div class="text-gray-600">
                <span class="font-semibold">Всього:</span> 105 уроків
            </div>
            <div class="relative w-full md:w-64">
                <input type="text" id="lessonSearch" placeholder="Пошук за номером..." 
                       class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
        </div>
    </div>

    <!-- Grid of Lessons -->
    <main class="container mx-auto px-4">
        <div id="lessonGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-7 xl:grid-cols-8 gap-4">
            <!-- Buttons will be generated by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-16 text-center text-gray-500 text-sm">
        <p>&copy; Онлайн-кабінет фізики - 229</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('lessonGrid');
            const searchInput = document.getElementById('lessonSearch');
            const totalLessons = 105;

            // Function to generate buttons
            function generateButtons() {
                grid.innerHTML = '';
                for (let i = 1; i <= totalLessons; i++) {
                    const btn = document.createElement('a');
                    // Шлях до папки уроку (змінюйте формат за потреби, наприклад 'lessons/lesson-1/')
                    btn.href = `lesson-${i}/index.html`; 
                    btn.className = 'lesson-card bg-white border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center hover:border-blue-400 hover:bg-blue-50 group';
                    btn.dataset.lesson = i;
                    
                    btn.innerHTML = `
                        <span class="text-xs font-bold text-gray-400 group-hover:text-blue-400 mb-1">УРОК</span>
                        <span class="text-2xl font-black text-gray-800 group-hover:text-blue-600">${i}</span>
                    `;
                    
                    grid.appendChild(btn);
                }
            }

            // Simple Search/Filter Logic
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.trim();
                const cards = document.querySelectorAll('.lesson-card');
                
                cards.forEach(card => {
                    const lessonNum = card.dataset.lesson;
                    if (term === '' || lessonNum.includes(term)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });

            generateButtons();
        });
    </script>
</body>
</html>
