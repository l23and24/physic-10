<!DOCTYPE html>
<html lang="uk" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Механічні властивості твердих тіл</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .main-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }

        .step-number {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 800;
            margin-right: 1.25rem;
            font-size: 1.1rem;
            color: white;
        }

        /* Gradient Accents */
        .bg-step-1 { background: linear-gradient(135deg, #60a5fa, #2563eb); }
        .bg-step-2 { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .bg-step-3 { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .bg-step-4 { background: linear-gradient(135deg, #34d399, #059669); }
        .bg-step-5 { background: linear-gradient(135deg, #f87171, #dc2626); }
        .bg-step-6 { background: linear-gradient(135deg, #94a3b8, #475569); }

        /* Formula Box Styling */
        .formula-container {
            background: linear-gradient(145deg, #ffffff, #f1f5f9);
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .formula-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #3b82f6;
        }

        .math-display {
            font-size: 1.3rem;
            color: #1e293b;
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="main-bg text-slate-900 min-h-screen pb-12">
